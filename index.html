<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GlintEarn - Premium Platform</title>

    <!-- Ad SDK -->
    <script src='//libtl.com/sdk.js' data-zone='10730933' data-sdk='show_10730933'></script>

    <!-- CDN Libraries -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>

    <style>
        :root {
            --milk: #F5F5DC;
            --brown: #5D4037;
            --dark-brown: #3E2723;
            --tan: #D2B48C;
            --white: #FFFFFF;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background-color: var(--milk); 
            color: var(--dark-brown); 
            font-family: 'Trebuchet MS', sans-serif; 
            margin: 0; padding: 20px;
        }

        /* Splash Screen */
        #splash {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: var(--milk); display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 10000;
        }
        #splash img { width: 100px; border-radius: 20px; margin-bottom: 20px; }

        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .history-icon { 
            background: var(--brown); color: var(--milk); width: 45px; height: 45px; 
            border-radius: 12px; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; font-size: 22px; border: 2px solid var(--tan);
        }

        /* Balance Card */
        .wallet-card {
            background: var(--brown); color: var(--milk);
            padding: 35px 20px; border-radius: 35px 5px 35px 5px;
            text-align: center; box-shadow: 0 10px 25px rgba(93, 64, 55, 0.3);
            margin-bottom: 25px; border: 1.5px solid var(--tan);
        }
        .wallet-card h1 { margin: 10px 0; font-size: 45px; font-weight: 900; }

        /* Stats Row */
        .stats-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 25px; }
        .stat-item { background: var(--white); padding: 15px; border-radius: 18px; text-align: center; border: 1.5px solid var(--tan); }
        .stat-item b { color: var(--brown); font-size: 18px; display: block; }

        /* Action Buttons */
        .btn-main { 
            background: var(--brown); color: var(--milk); width: 100%; 
            padding: 18px; border-radius: 15px; border: none; font-weight: bold;
            font-size: 16px; margin-bottom: 15px; cursor: pointer;
            box-shadow: 0 4px 0 var(--dark-brown);
        }
        .btn-main:active { transform: translateY(2px); box-shadow: none; }

        /* Jobs Section */
        .job-card {
            background: var(--white); border-radius: 20px; padding: 18px;
            margin-bottom: 15px; display: flex; justify-content: space-between;
            align-items: center; border-left: 8px solid var(--brown);
            box-shadow: 0 4px 6px rgba(0,0,0,0.02);
        }
        .job-info h4 { margin: 0; font-size: 15px; }
        .job-info span { color: #2e7d32; font-weight: bold; font-size: 14px; }
        
        .btn-job { 
            background: var(--tan); color: var(--dark-brown); border: none; 
            padding: 10px 18px; border-radius: 12px; font-weight: 900; font-size: 13px;
        }
        .btn-job:disabled { background: #eee; color: #aaa; }
        .btn-claim { background: #4caf50 !important; color: white !important; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% {transform: scale(1);} 50% {transform: scale(1.05);} 100% {transform: scale(1);} }

        /* Modal */
        #history-modal {
            display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 10001; padding: 25px;
        }
        .modal-body { background: var(--milk); padding: 25px; border-radius: 25px; max-height: 80vh; overflow-y: auto; }

        /* Footer */
        .footer-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 30px; border-top: 2px solid var(--tan); padding-top: 20px; }
        .footer-btn { 
            background: var(--white); border: 1.5px solid var(--brown); border-radius: 15px; 
            padding: 15px; text-align: center; color: var(--brown); font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="splash"><img src="logo.png"><b>GlintEarn</b></div>

    <div class="header">
        <div>Welcome, <b id="display-name">Guest</b></div>
        <div class="history-icon" onclick="toggleHistory(true)">🕒</div>
    </div>

    <div class="wallet-card">
        <small>AVAILABLE USDT</small>
        <h1 id="bal-text">$0.000</h1>
        <small>Min: $5.00 + 10 Referrals</small>
    </div>

    <div class="stats-row">
        <div class="stat-item"><b id="ads-count">0/15</b><small>Daily Ads</small></div>
        <div class="stat-item"><b id="ref-count">0/10</b><small>Invites</small></div>
    </div>

    <button class="btn-main" onclick="watchAd()">📺 Watch Rewarded Ad (Daily 15)</button>
    <button class="btn-main" style="background:var(--tan); color:var(--dark-brown)" onclick="handleWithdraw()">💰 Withdraw to BEP20</button>

    <h3>⚡ Micro Jobs (6h Cooldown)</h3>
    <div id="jobs-container"></div>

    <div class="footer-grid">
        <div class="footer-btn" onclick="inviteFriend()">🔗 Share Invite</div>
        <div class="footer-btn" onclick="window.location.href='mailto:glintearnsupport@gmail.com'">🎧 Support</div>
    </div>

    <!-- History Modal -->
    <div id="history-modal" onclick="toggleHistory(false)">
        <div class="modal-body" onclick="event.stopPropagation()">
            <h3 style="margin-top:0">Withdrawal History</h3>
            <div id="hist-list">No records yet.</div>
            <button class="btn-main" style="margin-top:20px" onclick="toggleHistory(false)">Close</button>
        </div>
    </div>

    <script>
        // FIREBASE CONFIG
        const firebaseConfig = {
            apiKey: "AIzaSyAzzgsXE6dpO5OD6LO0g8osMY1tZ5xoh14",
            authDomain: "glintearn.firebaseapp.com",
            databaseURL: "https://glintearn-default-rtdb.firebaseio.com",
            projectId: "glintearn",
            storageBucket: "glintearn.firebasestorage.app",
            messagingSenderId: "670088953296",
            appId: "1:670088953296:web:29c03248336765e623cdd5"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const tg = window.Telegram.WebApp;
        tg.expand();

        const userId = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.id : "test_user";
        const firstName = tg.initDataUnsafe.user ? tg.initDataUnsafe.user.first_name : "User";
        const userRef = db.ref('users/' + userId);

        const jobs = [
            {id: 1, title: "Micro Task 1", reward: 0.01},
            {id: 2, title: "Quick Site Visit", reward: 0.01},
            {id: 3, title: "Premium Visit", reward: 0.015},
            {id: 4, title: "Sponsor Click", reward: 0.01},
            {id: 5, title: "Daily Bonus Task", reward: 0.02}
        ];

        // Load Data
        userRef.on('value', s => {
            const u = s.val();
            if(!u) {
                let refBy = new URLSearchParams(window.location.search).get('start');
                userRef.set({ name: firstName, balance: 0.0, adsCount: 0, referrals: 0, lastAdDate: "" });
                if(refBy) db.ref('users/'+refBy+'/referrals').transaction(c => (c||0)+1);
            } else {
                renderUI(u);
                renderJobs(u.cooldowns || {});
            }
            document.getElementById('splash').style.display = 'none';
        });

        function renderUI(u) {
            document.getElementById('bal-text').innerText = "$" + (u.balance || 0).toFixed(3);
            document.getElementById('ads-count').innerText = (u.adsCount || 0) + "/15";
            document.getElementById('ref-count').innerText = (u.referrals || 0) + "/10";
            document.getElementById('display-name').innerText = u.name;
            
            const today = new Date().toDateString();
            if(u.lastAdDate !== today) userRef.update({ adsCount: 0, lastAdDate: today });
        }

        function renderJobs(cooldowns) {
            const container = document.getElementById('jobs-container');
            container.innerHTML = "";
            const now = Date.now();

            jobs.forEach(j => {
                const lastTime = cooldowns[j.id] || 0;
                const remaining = (6 * 60 * 60 * 1000) - (now - lastTime);

                let btnHtml = "";
                if(remaining > 0) {
                    const h = Math.floor(remaining / 3600000);
                    const m = Math.floor((remaining % 3600000) / 60000);
                    btnHtml = `<button class="btn-job" disabled>${h}h ${m}m</button>`;
                } else {
                    btnHtml = `<button class="btn-job" id="job-${j.id}" onclick="startJob(${j.id}, ${j.reward})">Start</button>`;
                }

                container.innerHTML += `
                    <div class="job-card">
                        <div class="job-info"><h4>${j.title}</h4><span>+$${j.reward}</span></div>
                        ${btnHtml}
                    </div>`;
            });
        }

        // Job Logic Fix
        function startJob(id, reward) {
            const btn = document.getElementById(`job-${id}`);
            tg.openLink("https://omg10.com/4/10515414");
            
            btn.innerText = "Wait 15s...";
            btn.disabled = true;

            let seconds = 15;
            const timer = setInterval(() => {
                seconds--;
                btn.innerText = `Wait ${seconds}s`;
                if(seconds <= 0) {
                    clearInterval(timer);
                    btn.innerText = "Claim Now";
                    btn.classList.add('btn-claim');
                    btn.disabled = false;
                    btn.onclick = () => claimJob(id, reward);
                }
            }, 1000);
        }

        function claimJob(id, reward) {
            if(typeof show_10730933 === 'function') {
                show_10730933().then(() => {
                    userRef.child('balance').transaction(b => (b||0) + reward);
                    userRef.child('cooldowns/'+id).set(Date.now());
                    tg.showAlert("Task Verified! Reward added.");
                }).catch(() => tg.showAlert("Please watch the ad to verify."));
            }
        }

        function watchAd() {
            userRef.child('adsCount').once('value', s => {
                if((s.val() || 0) >= 15) return tg.showAlert("Daily limit reached!");
                if(typeof show_10730933 === 'function') {
                    show_10730933().then(() => {
                        userRef.child('balance').transaction(b => (b||0) + 0.005);
                        userRef.child('adsCount').transaction(c => (c||0) + 1);
                        tg.showAlert("Success! +$0.005 added.");
                    });
                }
            });
        }

        function handleWithdraw() {
            userRef.once('value', s => {
                const u = s.val();
                if(u.balance < 5) return tg.showAlert("Need $5.00 to withdraw.");
                if(u.referrals < 10) return tg.showAlert("Need 10 referrals to unlock.");
                
                const addr = prompt("Enter USDT (BEP20) Address:");
                if(addr && addr.length > 15) {
                    db.ref('withdrawals').push({ userId, amount: 5, addr, status: 'pending', date: Date.now() });
                    userRef.child('balance').transaction(b => b - 5);
                    tg.showAlert("Withdrawal submitted!");
                }
            });
        }

        function inviteFriend() {
            const descs = [
                "Make money daily with GlintEarn! 💰",
                "Earn USDT by watching ads! 🚀",
                "The best earning bot is here! 💎",
                "Start your passive income today! 💸"
            ];
            const text = descs[Math.floor(Math.random() * descs.length)];
            const link = `https://t.me/GlintEarnBot?start=${userId}`;
            tg.openTelegramLink(`https://t.me/share/url?url=${link}&text=${encodeURIComponent(text)}`);
        }

        function toggleHistory(show) {
            const modal = document.getElementById('history-modal');
            modal.style.display = show ? 'block' : 'none';
            if(show) {
                db.ref('withdrawals').orderByChild('userId').equalTo(userId.toString()).once('value', s => {
                    const list = s.val();
                    const cont = document.getElementById('hist-list');
                    cont.innerHTML = "";
                    if(!list) cont.innerHTML = "No history found.";
                    else {
                        for(let id in list) {
                            cont.innerHTML += `<div style="border-bottom:1px solid #ddd; padding:10px 0;">
                                $${list[id].amount} - <b>${list[id].status}</b><br><small>${new Date(list[id].date).toLocaleDateString()}</small>
                            </div>`;
                        }
                    }
                });
            }
        }

        tg.ready();
    </script>
</body>
</html>
